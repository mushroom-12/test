<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서온유</title>
<style>
    html, body { margin: 0; padding: 0; height: 100%;}
    header {background: white;}
    section{background: skyblue;}
    footer{background: yellow;}
</style>
</head>
<body>
    <header>
        <h1>명함 신청 페이지</h1>
    </header>
    <section>
        <p>1. 학년:<select name="grade" size="1"></p>
        <option value="1">1학년</option>
        <option value="2">2학년</option>
        <option value="3">3학년</option>
    </select>

        <p>2. 반:<select name="class" size="1"></p>
        <option value="1">1반</option>
        <option value="2">2반</option>
        <option value="3">3반</option>
        <option value="4">4반</option>
    </select>

    <p>3. 번호:<input type="text" size="15" value=""></p>
    <p>4. 이름:<input type="text" size="15" value=""></p>

    5. 원하는 시안 번호 선택
    <p><img src="https://lh7-rt.googleusercontent.com/formsz/AN7BsVCherQ6yMUjmXW0gCRKc1nZuHfLQV0kwh2n64XaO7WTbSKZLBxS2T-1ne4VtoAT8k6LIcmieNu_M9Mf6iw7wukTLGHW0y3pX21-pIelI0Vv2llcuQYizn-Q3LHjM5uVBhqVYeuuCXrvyjAVyvy2kf5QGYvTdBhMJCVx?key=zXC0opYBWS7IVmphVU1lkQ" width="600"><br>
    <input type="radio" name="sel" value="1" checked> 1안
    <input type="radio" name="sel" value="2" checked> 2안
    <input type="radio" name="sel" value="3" checked> 3안
    <input type="radio" name="sel" value="4" checked> 4안
    <br>
    <input type="radio" name="sel" value="5" checked> 5안
    <input type="radio" name="sel" value="6" checked> 6안
    <input type="radio" name="sel" value="7" checked> 7안
    <input type="radio" name="sel" value="8" checked> 8안
    </p>

    6. 내가 명함에 넣고 싶은 항목 선택
    <p>
        <input type="checkbox" value="name"> 이름
        <input type="checkbox" value="email"> 이메일
        <br>
        <input type="checkbox" value="discode"> 디스코드 아이디
        <input type="checkbox" value="github"> 깃헙 아이디
        <br>
        <input type="checkbox" value="interest"> 관심분야
        <input type="checkbox" value="phone number"> 휴대폰 번호
    </p>
     7. 기타 건의사항
    <p>
        <textarea cols="20"
        rows="10">
        </textarea>
    </p>

    <input type="submit" value="전송하기">
    <button type="submit">초기화하기</button>
    
    </section>
    <footer>
        <h2>
            QnA
        </h2>
        <details>
            <summary>언제까지 내요?</summary>
            <p>3월 11일까지 제출합니다</p>
        </details>
        <details>
            <summary>명함 얼마에요?</summary>
            <p>무료입니다</p>
        </details>
        <details>
            <summary>늦게 내면 어떻게돼요?</summary>
            <p>1학년 <b><u>전원</u></b>의 명함발급이 늦어집니다</p>
        </details>
    </footer>

</body>
</html>
