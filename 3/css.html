<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*css 주석 넣는 방법( css 시트 작성)*/
        body {background-color: aq ua}
        h3 {color: pink}
        hr {border: 3px solid grey}
        span {color: blue;/*여기서 color와 font size는 프로퍼티, blue, 20px은 값이다*/ font-size:20px} /*style 시트에서는 대소문자 구분이 거의 되지 않음*/
    </style>
</head>
<body>
    <h3>css스타일 적용</h3>
    <hr>
    <p>
        나는 <span>웹기</span>시간만 되면 잠이 옴
    </p>
</body>
</html>
