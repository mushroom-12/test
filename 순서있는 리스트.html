<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>라면 끓리는 순서</title>
</head>
<body>
    <h1>라면을 끓이는 순서</h1>
    <ol type="A">
        <li>물을 끓인다</li>
        <li>면과 스프를 넣는다</li>
        <li>계란을 넣는다</li>
        <ul>
            <li>혹은 햄을 넣거나</li>
            <li>참치을 넣거나</li>
            <li>혹은 햄을 넣거나</li>
            <ol>
                <li>스팸등등</li>
            </ol>
            <li>혹은 대파을 넣거나</li>
            <li>혹은 콩나물을 넣거나</li>
        </ul>
        <li>3분동안 기다린다</li>
        <li>라면을 맛있게 먹는다</li>
    </ol>
</body>
</html>
